<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Puntos CSV</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .layout-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            justify-content: center;
        }
        .sidebar {
            width: 300px;
            background: #34495e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-height: 800px;
            overflow-y: auto;
        }
        .sidebar h2 {
            margin-top: 0;
            font-size: 1.2em;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            color: #f1c40f;
        }
        .prediction-item {
            background: #2c3e50;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #f1c40f;
        }
        .prediction-item .code {
            font-weight: bold;
            font-size: 1.1em;
        }
        .prediction-item .delay {
            color: #e74c3c;
            font-weight: bold;
        }
        .radar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 4px solid #34495e;
            background-color: #001f3f;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        .controls {
            margin-bottom: 20px;
            background: #34495e;
            padding: 10px 20px;
            border-radius: 8px;
        }
        .status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <h1>Radar AeroSync</h1>
    
    <div class="layout-container">
        <aside class="sidebar">
            <h2>Predicciones de Retraso</h2>
            <div id="predictions-list">Cargando datos...</div>
        </aside>

        <div class="radar-section">
            <canvas id="pointCanvas" width="800" height="800"></canvas>
            <div id="status" class="status">Iniciando sistemas...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pointCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const predictionsList = document.getElementById('predictions-list');
        
        // --- CONFIGURACIÓN Y ASSETS ---
        const PADDING = 0; // Sin padding para que el fondo cubra todo
        const PLANE_SIZE = 10;
        
        // Imagen de fondo (puedes cambiar esta URL por tu mapa local 'mapa.jpg')
        const backgroundImage = new Image();
        backgroundImage.src = 'map.png'; 
        
        // Icono de avión (SVG)
        const planeIcon = new Image();
        planeIcon.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cGF0aCBmaWxsPSIjRkZEMzAwIiBkPSJNNTEyIDI1NmMwIDExLjMtOS4yIDIwLjYtMjAuNiAyMC42SDE0NC4zTDQwLjYgNDI3LjVjLTYuOSAxMS4zLTIwLjcgMTUuNC0zMi4xIDguNXMtMTUuNC0yMC43LTguNS0zMi4xTDU1LjggMjU2IDI1LjYgNzkuNmMtNi45LTExLjMtMi44LTI1LjIgOC41LTMyLjFzMjUuMi0yLjggMzIuMSA4LjVsMTAzLjcgMTUwLjloMzQ3LjFjMTEuNCAwIDIwLjYgOS4zIDIwLjYgMjAuNnoiLz48L3N2Zz4=';

        let lastData = [];

        async function fetchPredictions() {
            try {
                const response = await fetch('predict.json?t=' + Date.now());
                if (!response.ok) throw new Error('Error al cargar predicciones');
                const data = await response.json();
                
                predictionsList.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'prediction-item';
                    div.innerHTML = `
                        <div class="code">${item.codigo}</div>
                        <div class="region">${item.region}</div>
                        <div class="delay">${item.delay_minutes.toFixed(2)} min retraso</div>
                    `;
                    predictionsList.appendChild(div);
                });
            } catch (error) {
                predictionsList.innerHTML = '<div style="color: #e74c3c">Error cargando predicciones</div>';
            }
        }

        async function fetchData() {
            try {
                const response = await fetch('datos.csv?t=' + Date.now());
                if (!response.ok) throw new Error('No se pudo cargar el CSV');
                
                const text = await response.text();
                const lines = text.trim().split('\n');
                const dataLines = lines.slice(1);
                
                lastData = dataLines.map(line => {
                    const [x, y, dir] = line.split(',').map(Number);
                    return { x, y, dir };
                }).filter(p => !isNaN(p.x) && !isNaN(p.y));

                requestAnimationFrame(draw);
                statusDiv.innerText = `Radar activo: ${new Date().toLocaleTimeString()} - ${lastData.length} aeronaves en zona.`;
            } catch (error) {
                statusDiv.innerText = 'Error: ' + error.message;
            }
        }

        function draw() {
            // 1. Dibujar imagen de fondo
            if (backgroundImage.complete) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#001f3f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. Dibujar aviones
            const minX = 0, maxX = 110;
            const minY = 0, maxY = 110;

            const scaleX = canvas.width / (maxX - minX);
            const scaleY = canvas.height / (maxY - minY);

            lastData.forEach(p => {
                const screenX = (p.x - minX) * scaleX;
                const screenY = canvas.height - (p.y - minY) * scaleY;

                ctx.save();
                ctx.translate(screenX, screenY);
                const angleRad = (p.dir - 90) * Math.PI / 180;
                ctx.rotate(angleRad);
                ctx.shadowBlur = 5;
                ctx.shadowColor = "black";
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.drawImage(planeIcon, -PLANE_SIZE/2, -PLANE_SIZE/2, PLANE_SIZE, PLANE_SIZE);
                ctx.restore();
            });
        }

        // Bucle de actualización
        fetchData();
        fetchPredictions();
        setInterval(fetchData, 15000);
        setInterval(fetchPredictions, 5000); // Actualizar predicciones cada 5 segundos
        
        backgroundImage.onload = draw;
        planeIcon.onload = draw;
    </script>
</body>
</html>
